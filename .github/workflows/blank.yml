name: Bourse Casa Bot

on:
  schedule:
    - cron: '0 8-22 * * *'   # Toutes les heures de 9h à 23h (heure marocaine)
  workflow_dispatch:          # Permet de lancer manuellement

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: bourse-casa-bot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance requests pandas

      - name: Generate data.json
        run: |
          cd bourse-casa-bot
          python generate_data.py

      - name: Commit and push data.json
        run: |
          cd bourse-casa-bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Mise à jour automatique des données"
          git push
