name: Bourse Casa Bot

on:
  schedule:
    - cron: '0 8-22 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: bourse-casa-bot
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install yfinance requests pandas
          
      - name: Debug - list files
        run: ls -la bourse-casa-bot/
        
      - name: Run bot
        run: python bourse-casa-bot/bot.py
