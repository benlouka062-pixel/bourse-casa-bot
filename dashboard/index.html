<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAOUSSI TRADER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; }
        .glass { background: rgba(26,26,26,0.95); backdrop-filter: blur(10px); border: 1px solid #333; }
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
    </style>
</head>
<body class="p-4 text-gray-200">

<div class="max-w-6xl mx-auto">
    
    <!-- HEADER -->
    <div class="glass rounded-xl p-4 mb-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-green-500">TAOUSSI TRADER</h1>
        <div x-data="{ time: '' }" x-init="setInterval(() => time = new Date().toLocaleTimeString('fr-FR'), 1000)" x-text="time" class="font-mono"></div>
    </div>

    <!-- GRILLE ACTIONS -->
    <div class="glass rounded-xl p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3" id="actions-grid">
            <div class="text-center py-4">Chargement...</div>
        </div>
    </div>
</div>

<script>
async function loadData() {
    try {
        const res = await fetch('https://benlouka062-pixel.github.io/bourse-casa-bot./data.json?t=' + Date.now());
        const data = await res.json();
        
        const grid = document.getElementById('actions-grid');
        if (!data.actions || data.actions.length === 0) {
            grid.innerHTML = '<div class="text-center py-8 text-gray-500">Aucune donnée</div>';
            return;
        }
        
        grid.innerHTML = data.actions.map(a => `
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700">
                <div class="flex justify-between">
                    <span class="font-bold text-green-500">${a.sym}</span>
                    <span class="text-sm text-gray-400">${a.nom || ''}</span>
                </div>
                <div class="text-xl font-mono mt-2">${a.prix?.toFixed(2) || '---'} DH</div>
                <div class="flex justify-between mt-2 text-sm">
                    <span>RSI: <span class="${a.rsi > 70 ? 'trend-up' : a.rsi < 30 ? 'trend-down' : ''}">${a.rsi || '--'}</span></span>
                    <span class="${a.signal === 'ACHAT' ? 'text-green-500' : a.signal === 'VENTE' ? 'text-red-500' : ''}">${a.signal || 'ATTENTE'}</span>
                </div>
            </div>
        `).join('');
        
    } catch (e) {
        document.getElementById('actions-grid').innerHTML = '<div class="text-center py-8 text-red-500">Erreur chargement</div>';
    }
}
loadData();
setInterval(loadData, 60000);
</script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</body>
</html>
