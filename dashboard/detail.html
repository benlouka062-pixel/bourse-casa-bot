<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TAOUSSI CAPITAL · DÉTAIL</title>
    
    <!-- Lightweight Charts (TradingView) -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@100..800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f0f0f; color: #e5e7eb; }
        .glass-card { background: rgba(22,22,22,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.03); border-radius: 1rem; }
        .trend-up { color: #26a69a; }
        .trend-down { color: #ef5350; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .period-btn {
            background: #2a2a2a;
            color: #aaa;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .period-btn.active {
            background: #26a69a;
            color: white;
            border-color: #26a69a;
        }
        .period-btn:hover {
            background: #3a3a3a;
        }
        
        .back-btn {
            background: #2a2a2a;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #444;
            cursor: pointer;
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #3a3a3a;
        }
        
        .indicator-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        
        #tvchart {
            width: 100%;
            height: 400px;
        }
        
        #rsiChart {
            width: 100%;
            height: 100px;
            margin-top: 8px;
        }
    </style>
</head>
<body class="p-4 min-h-screen">

<div x-data="detailApp()" x-init="init()" class="max-w-7xl mx-auto">
    
    <!-- Bouton retour -->
    <div class="mb-4">
        <button @click="goBack" class="back-btn">
            <i class="fas fa-arrow-left"></i> Retour au tableau
        </button>
    </div>

    <!-- En-tête de l'action -->
    <div class="glass-card p-6 mb-6 flex flex-wrap justify-between items-center" x-show="action">
        <div>
            <h1 class="text-3xl font-bold" x-text="action?.sym"></h1>
            <p class="text-gray-400" x-text="action?.nom"></p>
        </div>
        <div class="text-right">
            <div class="text-4xl font-mono font-bold" :class="variation >= 0 ? 'trend-up' : 'trend-down'" x-text="action?.prix?.toFixed(2) + ' DH'"></div>
            <p class="text-lg" :class="variation >= 0 ? 'trend-up' : 'trend-down'" x-text="(variation > 0 ? '+' : '') + variation.toFixed(2) + '%'"></p>
        </div>
    </div>

    <!-- Boutons de période -->
    <div class="glass-card p-4 mb-6 flex flex-wrap gap-2 justify-center">
        <button class="period-btn" :class="{ 'active': period === '1d' }" @click="setPeriod('1d')">1j</button>
        <button class="period-btn" :class="{ 'active': period === '1w' }" @click="setPeriod('1w')">1s</button>
        <button class="period-btn" :class="{ 'active': period === '1m' }" @click="setPeriod('1m')">1m</button>
        <button class="period-btn" :class="{ 'active': period === '3m' }" @click="setPeriod('3m')">3m</button>
    </div>

    <!-- Graphique principal -->
    <div class="glass-card p-4 mb-6">
        <div id="tvchart"></div>
        <div id="rsiChart"></div>
    </div>

    <!-- Indicateurs chiffrés -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="indicator-card">
            <p class="text-gray-500 text-sm">RSI (14)</p>
            <p class="text-2xl font-mono" :class="rsi > 70 ? 'trend-up' : rsi < 30 ? 'trend-down' : ''" x-text="rsi.toFixed(1)"></p>
        </div>
        <div class="indicator-card">
            <p class="text-gray-500 text-sm">EMA 20</p>
            <p class="text-2xl font-mono" x-text="ema20.toFixed(2)"></p>
        </div>
        <div class="indicator-card">
            <p class="text-gray-500 text-sm">EMA 50</p>
            <p class="text-2xl font-mono" x-text="ema50.toFixed(2)"></p>
        </div>
        <div class="indicator-card">
            <p class="text-gray-500 text-sm">Volume</p>
            <p class="text-2xl font-mono" x-text="volume?.toLocaleString() || 'N/A'"></p>
        </div>
    </div>
</div>

<script>
function detailApp() {
    return {
        action: null,
        variation: 0,
        period: '1m',
        historique: [],
        chart: null,
        rsiChart: null,
        lineSeries: null,
        rsiSeries: null,
        rsi: 50,
        ema20: 0,
        ema50: 0,
        volume: 0,

        async init() {
            const urlParams = new URLSearchParams(window.location.search);
            const symbol = urlParams.get('symbol');
            if (!symbol) {
                window.location.href = 'index.html';
                return;
            }
            await this.loadData(symbol);
        },

        async loadData(symbol) {
            try {
                const res = await fetch('https://benlouka062-pixel.github.io/bourse-casa-bot/data.json?t=' + Date.now());
                const data = await res.json();
                this.action = data.actions?.find(a => a.sym === symbol);
                if (!this.action) return;

                // Variation simulée (à remplacer par une vraie variation plus tard)
                this.variation = (Math.random() * 4 - 2);

                // Récupérer l'historique (liste de prix de clôture)
                if (this.action.historique && this.action.historique.length > 5) {
                    this.historique = this.action.historique;
                } else {
                    // Fallback: générer un historique autour du prix actuel
                    this.historique = [];
                    for (let i = 0; i < 30; i++) {
                        this.historique.push(this.action.prix * (0.95 + 0.01 * i));
                    }
                }

                // Calcul des indicateurs
                this.calculateIndicators();

                // Dessiner le graphique
                this.$nextTick(() => this.drawChart());

            } catch (e) {
                console.error('Erreur chargement', e);
            }
        },

        calculateIndicators() {
            const prices = this.historique;
            // EMA 20 et 50
            this.ema20 = this.calculateEMA(prices, 20).pop() || 0;
            this.ema50 = this.calculateEMA(prices, 50).pop() || 0;
            // RSI
            this.rsi = this.calculateRSI(prices, 14);
        },

        calculateEMA(prices, period) {
            if (prices.length < period) return prices.map(() => 0);
            const k = 2 / (period + 1);
            let ema = [prices[0]];
            for (let i = 1; i < prices.length; i++) {
                ema.push(prices[i] * k + ema[i-1] * (1 - k));
            }
            return ema;
        },

        calculateRSI(prices, period) {
            if (prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const diff = prices[prices.length - i] - prices[prices.length - i - 1];
                if (diff > 0) gains += diff;
                else losses -= diff;
            }
            if (losses === 0) return 100;
            const rs = gains / losses;
            return 100 - 100 / (1 + rs);
        },

        setPeriod(p) {
            this.period = p;
            this.drawChart();
        },

        drawChart() {
            if (!this.chart) {
                // Graphique principal
                this.chart = LightweightCharts.createChart(document.getElementById('tvchart'), {
                    width: document.getElementById('tvchart').clientWidth,
                    height: 400,
                    layout: {
                        backgroundColor: '#0f0f0f',
                        textColor: '#d1d4dc',
                    },
                    grid: {
                        vertLines: { color: '#1e1e1e' },
                        horzLines: { color: '#1e1e1e' },
                    },
                    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                    timeScale: { timeVisible: true, secondsVisible: false },
                });

                // Série principale (ligne)
                this.lineSeries = this.chart.addLineSeries({
                    color: '#26a69a',
                    lineWidth: 2,
                });

                // Graphique RSI
                this.rsiChart = LightweightCharts.createChart(document.getElementById('rsiChart'), {
                    width: document.getElementById('rsiChart').clientWidth,
                    height: 100,
                    layout: {
                        backgroundColor: '#0f0f0f',
                        textColor: '#d1d4dc',
                    },
                    grid: {
                        vertLines: { color: '#1e1e1e' },
                        horzLines: { color: '#1e1e1e' },
                    },
                    timeScale: { visible: false },
                });

                this.rsiSeries = this.rsiChart.addLineSeries({
                    color: '#f39c12',
                    lineWidth: 1,
                });

                // Lignes horizontales pour les seuils RSI
                this.rsiChart.addLineSeries({ color: '#ef5350', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed }).setData([{ time: '2020-01-01', value: 70 }]);
                this.rsiChart.addLineSeries({ color: '#26a69a', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed }).setData([{ time: '2020-01-01', value: 30 }]);
            }

            // Préparer les données selon la période
            const prices = this.historique;
            const dates = [];
            const now = new Date();
            for (let i = 0; i < prices.length; i++) {
                const d = new Date(now);
                d.setDate(now.getDate() - (prices.length - i));
                dates.push(d.toISOString().split('T')[0]);
            }

            let limit = prices.length;
            if (this.period === '1d') limit = Math.min(24, prices.length);
            else if (this.period === '1w') limit = Math.min(7, prices.length);
            else if (this.period === '1m') limit = Math.min(30, prices.length);
            else if (this.period === '3m') limit = Math.min(90, prices.length);

            const start = Math.max(0, prices.length - limit);
            const lineData = [];
            const rsiData = [];

            // Calcul des EMA pour les valeurs affichées
            const ema20Vals = this.calculateEMA(prices, 20);
            const ema50Vals = this.calculateEMA(prices, 50);

            for (let i = start; i < prices.length; i++) {
                const time = dates[i];
                lineData.push({ time, value: prices[i] });
                rsiData.push({ time, value: this.rsi }); // RSI constant pour simplifier (on pourrait calculer une série)
            }

            this.lineSeries.setData(lineData);
            this.rsiSeries.setData(rsiData);
        },

        goBack() {
            window.location.href = 'index.html';
        }
    }
}
</script>

</body>
</html>
